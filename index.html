<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe Book</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <h1>Recipe Explorer</h1>
        <form>
            <input type="text" placeholder="Search for recipes..."
             class="searchBox">
            <button type="submit" class="searchBtn">Search</button>
        </form>
    </nav>
</header>

<main>
    <section>
        <h2 class="browse-title">Browse Country</h2>

    <div class="country-scroll">

        <img src="https://flagcdn.com/w40/in.png" data-country="Indian" title="India">
        <img src="https://flagcdn.com/w40/it.png" data-country="Italian" title="Italy">
        <img src="https://flagcdn.com/w40/us.png" data-country="American" title="USA">
        <img src="https://flagcdn.com/w40/cn.png" data-country="Chinese" title="China">
        <img src="https://flagcdn.com/w40/fr.png" data-country="French" title="France">
        <img src="https://flagcdn.com/w40/jp.png" data-country="Japanese" title="Japan">
        <img src="https://flagcdn.com/w40/mx.png" data-country="Mexican" title="Mexico">
        <img src="https://flagcdn.com/w40/th.png" data-country="Thai" title="Thailand">
        <img src="https://flagcdn.com/w40/gr.png" data-country="Greek" title="Greece">
        <img src="https://flagcdn.com/w40/ma.png" data-country="Moroccan" title="Morocco">
        <img src="https://flagcdn.com/w40/tr.png" data-country="Turkish" title="Turkish">
        <img src="https://flagcdn.com/w40/gb.png" data-country="British" title="British">
        <img src="https://flagcdn.com/w40/ca.png" data-country="Canadian" title="Canadian">
        <img src="https://flagcdn.com/w40/vn.png" data-country="Vietnamese" title="Vietnamese">
        <img src="https://flagcdn.com/w40/ru.png" data-country="Russian" title="Russian">

    </div>
        <div class="recipe-container">
            <h2>Search your favourite recipes 🍽️</h2>
        </div>
        <div class="recipe-details">
            <button type="button" class="recipe-close-btn">
                <i class="fas fa-times"></i>
            </button>
            <div class="recipe-details-content"></div>
        </div>
    </section>
</main>

<script src="project.js"></script>
</body>
</html>
